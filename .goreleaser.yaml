version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: restless
    main: ./cmd/restless
    binary: restless
    ldflags:
      - -X main.version={{.Version}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: default
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md
      - LICENSE

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ .Tag }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

brews:
  - name: restless
    homepage: https://github.com/shahadulhaider/restless
    description: Terminal-native HTTP client using .http files with TUI and headless CLI
    license: MIT
    directory: Formula
    repository:
      owner: shahadulhaider
      name: homebrew-tap
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    install: |
      bin.install "restless"
    test: |
      system "#{bin}/restless", "version"

